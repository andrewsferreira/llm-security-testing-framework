services:
  lab:
    build:
      context: .
      dockerfile: lab/Dockerfile
    environment:
      LAB_MODE: ${LAB_MODE:-vulnerable}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      lab:
        condition: service_healthy
    volumes:
      - ./reports:/home/llmsec/reports
      - ./configs:/home/llmsec/configs:ro
    command: ["llmsec", "--help"]
