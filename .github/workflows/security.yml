name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install "bandit[toml,sarif]"

      - name: Run Bandit (SARIF)
        run: bandit -r src lab -c pyproject.toml -f sarif -o bandit-results.sarif
        continue-on-error: true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif

  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the project (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pip-audit
        run: pip-audit

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Scans the whole repository history directly via the CLI rather than
      # gitleaks/gitleaks-action, which computes a base..head commit range from the push
      # event and fails on an initial/squashed push where that range isn't resolvable
      # (no parent commit to diff against).
      - name: Run Gitleaks (full history scan)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --no-banner --redact -v

  hadolint:
    name: Hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint lab/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: lab/Dockerfile
