name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build artifacts and create a GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate changelog since the previous tag
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
          {
            echo "## Changes"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "${PREVIOUS_TAG}..${GITHUB_REF_NAME}" --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)"
            fi
          } > CHANGELOG_RELEASE.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          files: dist/*
          generate_release_notes: true

      # Publishing to PyPI is intentionally NOT automatic. To enable it, add a PYPI_API_TOKEN
      # repository secret and uncomment the step below.
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
